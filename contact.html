<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Cybersecurity Awareness</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a class="brand" href="index.html">
          <span class="brand-icon">🛡️</span>
          <span>CyberShield</span>
        </a>
        <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="threats.html">Threats</a>
          <a href="best-practices.html">Best Practices</a>
          <a href="quiz.html">Quiz</a>
          <a href="resources.html">Resources</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="container section contact-grid">
        <div>
          <p class="eyebrow">Contact</p>
          <h1>Reach out and stay connected</h1>
          <p>Share feedback, questions, or ideas for future resources. We are always happy to hear from the community.</p>
          <div class="social-links">
            <a href="#" aria-label="LinkedIn">in</a>
            <a href="#" aria-label="X">✕</a>
            <a href="#" aria-label="GitHub">⌘</a>
          </div>
        </div>
        <form class="contact-card">
          <label>
            Name
            <input type="text" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" placeholder="you@example.com" />
          </label>
          <label>
            Message
            <textarea rows="5" placeholder="How can we help?"></textarea>
          </label>
          <button class="btn btn-primary" type="submit">Send Message</button>
          <label class="newsletter">
            <input type="checkbox" /> Subscribe to the monthly newsletter
          </label>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <h3>CyberShield</h3>
          <p>Practical cyber awareness for a safer digital life.</p>
        </div>
      </div>
    </footer>

    <button id="scrollTop" class="scroll-top" aria-label="Scroll to top">↑</button>
  </body>
</html>
